name: Display quality checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-tools.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tool dependencies
        run: python -m pip install -r requirements-tools.txt

      - name: Compile Python tools
        run: |
          python -m py_compile tools/crop_pdf_images.py
          python -m py_compile tools/validate_question_bank.py

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Validate question bank and display assets
        run: python tools/validate_question_bank.py

      - name: Run browser-code smoke checks
        run: node tools/smoke_check.js
