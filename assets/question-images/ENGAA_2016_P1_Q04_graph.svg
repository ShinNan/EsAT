<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" role="img" aria-labelledby="title desc">
<title id="title">ENGAA 2016 Paper 1 Question 4 graph</title>
<desc id="desc">A graph of y against x with a straight line through the origin, dashed guide lines at x equals 2.0 and y equals 10, and axis labels x and y.</desc>
<rect width="100%" height="100%" fill="white"/>
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L8,4 L0,8 Z" fill="#222"/>
  </marker>
</defs>
<g font-family="Arial, Helvetica, sans-serif" fill="#222" stroke="#222" stroke-linecap="round" stroke-linejoin="round">
  <line x1="105" y1="285" x2="455" y2="285" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="105" y1="285" x2="105" y2="58" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="105" y1="285" x2="370" y2="105" stroke-width="3"/>
  <line x1="105" y1="105" x2="370" y2="105" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="370" y1="285" x2="370" y2="105" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="458" y="304" font-size="28" font-style="italic">x</text>
  <text x="79" y="70" font-size="28" font-style="italic">y</text>
  <text x="81" y="306" font-size="28">0.0</text>
  <text x="342" y="316" font-size="28">2.0</text>
  <text x="62" y="113" font-size="28">10</text>
  <text x="80" y="292" font-size="28">0</text>
</g>
</svg>
