  <circle class="circle" cx="155" cy="145" r="52"/>
  <g class="isotope" transform="translate(155,145)"><text class="iso-mass" x="-12" y="-18">235</text><text class="iso-proton" x="-12" y="13">92</text><text class="iso-symbol" x="8" y="4">U</text></g>
  <circle class="dot" cx="36" cy="145" r="5"/><g class="particle" transform="translate(35,122)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="48" y1="145" x2="92" y2="145"/>
  <circle class="circle" cx="315" cy="76" r="42"/><g class="isotope" transform="translate(315,76)"><text class="iso-mass" x="-16" y="-18">87</text><text class="iso-proton" x="-16" y="13">35</text><text class="iso-symbol" x="8" y="4">Br</text></g><line class="line" x1="203" y1="123" x2="267" y2="93"/>
  <circle class="circle" cx="315" cy="222" r="42"/><g class="isotope" transform="translate(315,222)"><text class="iso-mass" x="-16" y="-18">145</text><text class="iso-proton" x="-16" y="13">57</text><text class="iso-symbol" x="8" y="4">La</text></g><line class="line" x1="203" y1="167" x2="267" y2="202"/>
  <circle class="dot" cx="235" cy="128" r="5"/><g class="particle" transform="translate(258,118)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="203" y1="134" x2="228" y2="128"/>
  <circle class="dot" cx="235" cy="162" r="5"/><g class="particle" transform="translate(258,159)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="203" y1="152" x2="228" y2="162"/>
  <circle class="dot" cx="278" cy="145" r="5"/><g class="particle" transform="translate(300,138)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="203" y1="145" x2="271" y2="145"/>
