<svg xmlns="http://www.w3.org/2000/svg" width="520" height="340" viewBox="0 0 520 340" role="img" aria-labelledby="title desc">
<title id="title">ENGAA 2016 Paper 1 Question 4 graph</title>
<desc id="desc">A straight line graph of y against x from the origin to the point x equals 2.0, y equals 10.</desc>
<rect width="100%" height="100%" fill="white"/>
<line x1="80" y1="280" x2="450" y2="280" stroke="#111" stroke-width="3"/>
<line x1="80" y1="280" x2="80" y2="45" stroke="#111" stroke-width="3"/>
<line x1="80" y1="280" x2="395" y2="70" stroke="#111" stroke-width="4"/>
<text x="455" y="288" font-family="Arial, sans-serif" font-size="24">x</text>
<text x="68" y="38" font-family="Arial, sans-serif" font-size="24">y</text>
<text x="68" y="306" font-family="Arial, sans-serif" font-size="20">0</text>
<text x="386" y="306" font-family="Arial, sans-serif" font-size="20">2.0</text>
<text x="42" y="78" font-family="Arial, sans-serif" font-size="20">10</text>
<circle cx="80" cy="280" r="4" fill="#111"/>
<circle cx="395" cy="70" r="4" fill="#111"/>
</svg>