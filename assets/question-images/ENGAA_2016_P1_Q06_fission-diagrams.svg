  <circle class="dot" cx="36" cy="145" r="5"/><g class="particle" transform="translate(35,122)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="48" y1="145" x2="92" y2="145"/>
  <circle class="circle" cx="315" cy="76" r="42"/><g class="isotope" transform="translate(315,76)"><text class="iso-mass" x="-16" y="-18">137</text><text class="iso-proton" x="-16" y="13">54</text><text class="iso-symbol" x="8" y="4">Xe</text></g><line class="line" x1="203" y1="123" x2="267" y2="93"/>
  <circle class="circle" cx="315" cy="222" r="42"/><g class="isotope" transform="translate(315,222)"><text class="iso-mass" x="-16" y="-18">96</text><text class="iso-proton" x="-16" y="13">38</text><text class="iso-symbol" x="8" y="4">Sr</text></g><line class="line" x1="203" y1="167" x2="267" y2="202"/>
