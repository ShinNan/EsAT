<svg xmlns="http://www.w3.org/2000/svg" width="780" height="520" viewBox="0 0 780 520" role="img" aria-labelledby="title desc">
<title id="title">ENGAA 2016 Paper 1 Question 6 fission diagrams</title>
<desc id="desc">Three uranium-235 fission diagrams with incoming particles, arrows, daughter nuclei and emitted neutrons, matching the layout of the question paper.</desc>
<rect width="100%" height="100%" fill="white"/>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#222"/>
  </marker>
</defs>
<style>
  .label{font:26px Arial,Helvetica,sans-serif;fill:#222}.nuc{font:22px Arial,Helvetica,sans-serif;fill:#222;text-anchor:middle;dominant-baseline:middle}.small{font:18px Arial,Helvetica,sans-serif;fill:#222;text-anchor:middle;dominant-baseline:middle}.line{stroke:#222;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.circle{stroke:#222;stroke-width:2.4;fill:#fff}.dot{fill:#777;stroke:#222;stroke-width:2}
</style>
<g>
  <text class="label" x="120" y="42">diagram 1</text>
  <circle class="circle" cx="150" cy="142" r="52"/><text class="nuc" x="150" y="134">²³⁵</text><text class="nuc" x="150" y="158">₉₂U</text>
  <circle class="dot" cx="28" cy="142" r="5"/><text class="small" x="6" y="137">¹₁p</text><line class="line" x1="35" y1="142" x2="88" y2="142"/>
  <circle class="circle" cx="300" cy="70" r="42"/><text class="nuc" x="300" y="62">¹⁴⁴</text><text class="nuc" x="300" y="86">₅₆Ba</text><line class="line" x1="197" y1="118" x2="255" y2="89"/>
  <circle class="circle" cx="300" cy="220" r="42"/><text class="nuc" x="300" y="212">⁸⁹</text><text class="nuc" x="300" y="236">₃₆Kr</text><line class="line" x1="197" y1="166" x2="255" y2="200"/>
  <circle class="dot" cx="232" cy="126" r="5"/><text class="small" x="250" y="120">¹₀n</text><line class="line" x1="198" y1="132" x2="225" y2="126"/>
  <circle class="dot" cx="232" cy="158" r="5"/><text class="small" x="250" y="153">¹₀n</text><line class="line" x1="198" y1="150" x2="225" y2="158"/>
</g>
<g transform="translate(390,0)">
