  <circle class="dot" cx="278" cy="145" r="5"/><g class="particle" transform="translate(300,138)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="203" y1="145" x2="271" y2="145"/>
</g>
