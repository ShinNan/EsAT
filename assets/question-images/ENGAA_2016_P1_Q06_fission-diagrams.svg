<svg xmlns="http://www.w3.org/2000/svg" width="860" height="660" viewBox="0 0 860 660" role="img" aria-labelledby="title desc">
<title id="title">ENGAA 2016 Paper 1 Question 6 fission diagrams</title>
<desc id="desc">Three uranium-235 fission diagrams with incoming particles, arrows, daughter nuclei and emitted neutrons, matching the layout of the question paper.</desc>
<rect width="100%" height="100%" fill="white"/>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#222"/>
  </marker>
</defs>
<style>
  .label{font:24px Arial,Helvetica,sans-serif;fill:#222}.line{stroke:#222;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.circle{stroke:#222;stroke-width:2.4;fill:#fff}.dot{fill:#777;stroke:#222;stroke-width:2}.iso{font:20px Arial,Helvetica,sans-serif;fill:#222;text-anchor:middle}.small{font:16px Arial,Helvetica,sans-serif;fill:#222;text-anchor:middle}.mass{font-size:16px}.proton{font-size:16px}.symbol{font-size:22px}
</style>
<g id="diagram-1" transform="translate(45,38)">
  <text class="label" x="128" y="18">diagram 1</text>
  <circle class="circle" cx="155" cy="145" r="52"/>
  <text class="iso" x="155" y="137"><tspan class="mass" x="145" dy="-2">235</tspan><tspan class="proton" x="145" dy="18">92</tspan><tspan class="symbol" dx="4" dy="-9">U</tspan></text>
  <circle class="dot" cx="36" cy="145" r="5"/><text class="small" x="36" y="126">1</text><text class="small" x="36" y="169">p</text><line class="line" x1="48" y1="145" x2="92" y2="145"/>
  <circle class="circle" cx="315" cy="76" r="42"/><text class="iso" x="315" y="68"><tspan class="mass" x="305" dy="-2">144</tspan><tspan class="proton" x="305" dy="18">56</tspan><tspan class="symbol" dx="4" dy="-9">Ba</tspan></text><line class="line" x1="203" y1="123" x2="267" y2="93"/>
  <circle class="circle" cx="315" cy="222" r="42"/><text class="iso" x="315" y="214"><tspan class="mass" x="305" dy="-2">89</tspan><tspan class="proton" x="305" dy="18">36</tspan><tspan class="symbol" dx="4" dy="-9">Kr</tspan></text><line class="line" x1="203" y1="167" x2="267" y2="202"/>
  <circle class="dot" cx="245" cy="128" r="5"/><text class="small" x="264" y="123">n</text><line class="line" x1="203" y1="134" x2="238" y2="128"/>
  <circle class="dot" cx="245" cy="162" r="5"/><text class="small" x="264" y="157">n</text><line class="line" x1="203" y1="152" x2="238" y2="162"/>
</g>
<g id="diagram-2" transform="translate(455,38)">
  <text class="label" x="128" y="18">diagram 2</text>
  <circle class="circle" cx="155" cy="145" r="52"/>
  <text class="iso" x="155" y="137"><tspan class="mass" x="145" dy="-2">235</tspan><tspan class="proton" x="145" dy="18">92</tspan><tspan class="symbol" dx="4" dy="-9">U</tspan></text>
  <circle class="dot" cx="36" cy="145" r="5"/><text class="small" x="36" y="126">1</text><text class="small" x="36" y="169">n</text><line class="line" x1="48" y1="145" x2="92" y2="145"/>
  <circle class="circle" cx="315" cy="76" r="42"/><text class="iso" x="315" y="68"><tspan class="mass" x="305" dy="-2">137</tspan><tspan class="proton" x="305" dy="18">54</tspan><tspan class="symbol" dx="4" dy="-9">Xe</tspan></text><line class="line" x1="203" y1="123" x2="267" y2="93"/>
  <circle class="circle" cx="315" cy="222" r="42"/><text class="iso" x="315" y="214"><tspan class="mass" x="305" dy="-2">96</tspan><tspan class="proton" x="305" dy="18">38</tspan><tspan class="symbol" dx="4" dy="-9">Sr</tspan></text><line class="line" x1="203" y1="167" x2="267" y2="202"/>
  <circle class="dot" cx="235" cy="128" r="5"/><text class="small" x="254" y="123">n</text><line class="line" x1="203" y1="134" x2="228" y2="128"/>
  <circle class="dot" cx="235" cy="162" r="5"/><text class="small" x="254" y="157">n</text><line class="line" x1="203" y1="152" x2="228" y2="162"/>
  <circle class="dot" cx="278" cy="145" r="5"/><text class="small" x="297" y="140">n</text><line class="line" x1="203" y1="145" x2="271" y2="145"/>
</g>
<g id="diagram-3" transform="translate(250,340)">
  <text class="label" x="128" y="18">diagram 3</text>
  <circle class="circle" cx="155" cy="145" r="52"/>
  <text class="iso" x="155" y="137"><tspan class="mass" x="145" dy="-2">235</tspan><tspan class="proton" x="145" dy="18">92</tspan><tspan class="symbol" dx="4" dy="-9">U</tspan></text>
  <circle class="dot" cx="36" cy="145" r="5"/><text class="small" x="36" y="126">1</text><text class="small" x="36" y="169">n</text><line class="line" x1="48" y1="145" x2="92" y2="145"/>
  <circle class="circle" cx="315" cy="76" r="42"/><text class="iso" x="315" y="68"><tspan class="mass" x="305" dy="-2">87</tspan><tspan class="proton" x="305" dy="18">35</tspan><tspan class="symbol" dx="4" dy="-9">Br</tspan></text><line class="line" x1="203" y1="123" x2="267" y2="93"/>
  <circle class="circle" cx="315" cy="222" r="42"/><text class="iso" x="315" y="214"><tspan class="mass" x="305" dy="-2">145</tspan><tspan class="proton" x="305" dy="18">57</tspan><tspan class="symbol" dx="4" dy="-9">La</tspan></text><line class="line" x1="203" y1="167" x2="267" y2="202"/>
  <circle class="dot" cx="235" cy="128" r="5"/><text class="small" x="254" y="123">n</text><line class="line" x1="203" y1="134" x2="228" y2="128"/>
  <circle class="dot" cx="235" cy="162" r="5"/><text class="small" x="254" y="157">n</text><line class="line" x1="203" y1="152" x2="228" y2="162"/>
  <circle class="dot" cx="278" cy="145" r="5"/><text class="small" x="297" y="140">n</text><line class="line" x1="203" y1="145" x2="271" y2="145"/>
</g>
</svg>
