  <circle class="circle" cx="300" cy="70" r="42"/><text class="nuc" x="300" y="62">⁸⁷</text><text class="nuc" x="300" y="86">₃₅Br</text><line class="line" x1="197" y1="121" x2="255" y2="91"/>
