<svg xmlns="http://www.w3.org/2000/svg" width="860" height="660" viewBox="0 0 860 660" role="img" aria-labelledby="title desc">
<title id="title">ENGAA 2016 Paper 1 Question 6 fission diagrams</title>
<desc id="desc">Three uranium-235 fission diagrams with incoming particles, arrows, daughter nuclei and emitted neutrons, matching the layout of the question paper.</desc>
<rect width="100%" height="100%" fill="white"/>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#222"/>
  </marker>
</defs>
<style>
  .label{font:24px Arial,Helvetica,sans-serif;fill:#222}.line{stroke:#222;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.circle{stroke:#222;stroke-width:2.4;fill:#fff}.dot{fill:#777;stroke:#222;stroke-width:2}.iso-mass,.iso-proton{font:16px Arial,Helvetica,sans-serif;fill:#222;text-anchor:end}.iso-symbol{font:28px Arial,Helvetica,sans-serif;fill:#222;text-anchor:start;dominant-baseline:middle}.particle-mass,.particle-proton{font:12px Arial,Helvetica,sans-serif;fill:#222;text-anchor:end}.particle-symbol{font:18px Arial,Helvetica,sans-serif;fill:#222;text-anchor:start;dominant-baseline:middle}
</style>
<g id="diagram-1" transform="translate(45,38)">
  <text class="label" x="128" y="18">diagram 1</text>
  <circle class="circle" cx="155" cy="145" r="52"/>
  <g class="isotope" transform="translate(155,145)"><text class="iso-mass" x="-12" y="-18">235</text><text class="iso-proton" x="-12" y="13">92</text><text class="iso-symbol" x="8" y="4">U</text></g>
  <circle class="dot" cx="36" cy="145" r="5"/><g class="particle" transform="translate(35,122)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">1</text><text class="particle-symbol" x="5" y="2">p</text></g><line class="line" x1="48" y1="145" x2="92" y2="145"/>
  <circle class="circle" cx="315" cy="76" r="42"/><g class="isotope" transform="translate(315,76)"><text class="iso-mass" x="-16" y="-18">144</text><text class="iso-proton" x="-16" y="13">56</text><text class="iso-symbol" x="8" y="4">Ba</text></g><line class="line" x1="203" y1="123" x2="267" y2="93"/>
  <circle class="circle" cx="315" cy="222" r="42"/><g class="isotope" transform="translate(315,222)"><text class="iso-mass" x="-16" y="-18">89</text><text class="iso-proton" x="-16" y="13">36</text><text class="iso-symbol" x="8" y="4">Kr</text></g><line class="line" x1="203" y1="167" x2="267" y2="202"/>
  <circle class="dot" cx="245" cy="128" r="5"/><g class="particle" transform="translate(267,118)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="203" y1="134" x2="238" y2="128"/>
  <circle class="dot" cx="245" cy="162" r="5"/><g class="particle" transform="translate(267,158)"><text class="particle-mass" x="-8" y="-8">1</text><text class="particle-proton" x="-8" y="11">0</text><text class="particle-symbol" x="5" y="2">n</text></g><line class="line" x1="203" y1="152" x2="238" y2="162"/>
</g>
