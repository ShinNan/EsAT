  <circle class="dot" cx="28" cy="142" r="5"/><text class="small" x="6" y="137">¹₀n</text><line class="line" x1="35" y1="142" x2="88" y2="142"/>
  <circle class="circle" cx="300" cy="70" r="42"/><text class="nuc" x="300" y="62">¹³⁷</text><text class="nuc" x="300" y="86">₅₄Xe</text><line class="line" x1="197" y1="118" x2="255" y2="89"/>
  <circle class="circle" cx="300" cy="220" r="42"/><text class="nuc" x="300" y="212">⁹⁶</text><text class="nuc" x="300" y="236">₃₈Sr</text><line class="line" x1="197" y1="166" x2="255" y2="200"/>
  <circle class="dot" cx="232" cy="126" r="5"/><text class="small" x="250" y="120">¹₀n</text><line class="line" x1="198" y1="132" x2="225" y2="126"/>
  <circle class="dot" cx="232" cy="158" r="5"/><text class="small" x="250" y="153">¹₀n</text><line class="line" x1="198" y1="150" x2="225" y2="158"/>
  <circle class="dot" cx="275" cy="142" r="5"/><text class="small" x="294" y="137">¹₀n</text><line class="line" x1="198" y1="142" x2="268" y2="142"/>
</g>
