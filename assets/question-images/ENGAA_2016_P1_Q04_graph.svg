<svg xmlns="http://www.w3.org/2000/svg" width="600" height="410" viewBox="0 0 600 410" role="img" aria-labelledby="title desc">
<title id="title">ENGAA 2016 Paper 1 Question 4 graph</title>
<desc id="desc">A graph of y against x with a straight line through the origin, dashed guide lines at x equals 2.0 and y equals 10, and axis labels x and y.</desc>
<rect width="100%" height="100%" fill="white"/>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 Z" fill="#222"/>
  </marker>
</defs>
<g font-family="Arial, Helvetica, sans-serif" fill="#222" stroke="#222" stroke-linecap="round" stroke-linejoin="round">
  <line x1="120" y1="300" x2="500" y2="300" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="120" y1="300" x2="120" y2="62" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="120" y1="300" x2="400" y2="112" stroke-width="3.2"/>
  <line x1="120" y1="112" x2="400" y2="112" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="400" y1="300" x2="400" y2="112" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="508" y="319" font-size="28" font-style="italic">x</text>
  <text x="92" y="70" font-size="28" font-style="italic">y</text>
  <text x="102" y="332" font-size="24">0.0</text>
  <text x="373" y="336" font-size="24">2.0</text>
  <text x="70" y="120" font-size="24">10</text>
  <text x="91" y="294" font-size="24">0</text>
</g>
</svg>
