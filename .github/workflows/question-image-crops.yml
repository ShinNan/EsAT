name: Question image crops

on:
  pull_request:
    paths:
      - ".github/workflows/question-image-crops.yml"
      - "data/pdf-crops.json"
      - "docs/pdf-crop-workflow.md"
      - "requirements-tools.txt"
      - "source-papers/**"
      - "tests/test_crop_pdf_images.py"
      - "tools/crop_pdf_images.py"
      - "tools/crop_selector.html"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/question-image-crops.yml"
      - "data/pdf-crops.json"
      - "requirements-tools.txt"
      - "source-papers/**"
      - "tests/test_crop_pdf_images.py"
      - "tools/crop_pdf_images.py"
      - "tools/crop_selector.html"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-tools.txt

      - name: Install crop tooling
        run: python -m pip install -r requirements-tools.txt

      - name: Compile and test
        run: |
          python -m py_compile tools/crop_pdf_images.py
          python -m unittest discover -s tests -p "test_crop_pdf_images.py" -v

      - name: Validate manifest and build review assets
        run: |
          python tools/crop_pdf_images.py validate
          python tools/crop_pdf_images.py all
          python tools/crop_pdf_images.py validate --require-outputs

      - name: Upload debug pages and generated crops
        uses: actions/upload-artifact@v6
        with:
          name: question-image-crops-${{ github.sha }}
          path: |
            debug-renders/
            assets/question-images/*.png
          if-no-files-found: error
          retention-days: 7
